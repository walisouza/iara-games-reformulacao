<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Preferências – IARA</title>

  <link rel="icon" type="image/png" href="../imgs/favicon/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="../imgs/favicon/favicon.svg">
  <link rel="shortcut icon" href="../imgs/favicon/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="../imgs/favicon/apple-touch-icon.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Anton+SC&family=Gabarito:wght@400..900&display=swap"
    rel="stylesheet"
  >

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link rel="stylesheet" href="preferencias.css">
</head>

<body>

  <a href="/FORMULÁRIO IARA GAMES/criar conta.html" class="voltar">
    Voltar
  </a>

  <form action="../index.html" method="get">

    <main class="pref-wrapper container-fluid">

      <!-- Coluna esquerda -->
      <section class="pref-left d-flex flex-column">

        <div class="greeting">
          <h1>Olá Rafael</h1>

          <p>
            Conte um pouco sobre você para personalizarmos
            <br>
            sua experiência.
          </p>
        </div>

        <!-- Estilos -->
        <div class="pref-block">

          <h3>Escolha seu estilo favorito</h3>

          <div class="tags-row">

            <label class="tag">
              <input type="checkbox" name="estilo" value="acao">
              <span>Ação</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="aventura">
              <span>Aventura</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="esportes">
              <span>Esportes</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="mundo-aberto">
              <span>Mundo Aberto</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="fps">
              <span>FPS</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="estrategia">
              <span>Estratégia</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="terror">
              <span>Terror</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="simulacao">
              <span>Simulação</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="luta">
              <span>Luta</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="metroidvania">
              <span>Metroidvania</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="jrpg">
              <span>JRPG</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="rpg">
              <span>RPG</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="arcade">
              <span>Arcade</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="roguelike">
              <span>Roguelike</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="sobrevivencia">
              <span>Sobrevivência</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="cartas">
              <span>Cartas</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="tabuleiro">
              <span>Tabuleiro</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="misterio">
              <span>Mistério</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="plataforma">
              <span>Plataforma</span>
            </label>

            <label class="tag">
              <input type="checkbox" name="estilo" value="hack-slash">
              <span>Hack n' slash</span>
            </label>

          </div>
        </div>

        <!-- Modo -->
        <div class="pref-block">

          <h3>Como você gosta de jogar?</h3>

          <div class="tags-row">

            <label class="tag">
              <input type="radio" name="modo" value="competitivo">
              <span>Competitivo</span>
            </label>

            <label class="tag">
              <input type="radio" name="modo" value="casual">
              <span>Casual</span>
            </label>

            <label class="tag">
              <input type="radio" name="modo" value="multiplayer">
              <span>Multiplayer</span>
            </label>

            <label class="tag">
              <input type="radio" name="modo" value="singleplayer">
              <span>Singleplayer</span>
            </label>

          </div>
        </div>

        <!-- Botão -->
        <button type="submit" class="btn-entrar btn">
          Entrar
        </button>

      </section>

      <!-- Coluna direita -->
      <section class="pref-right d-flex flex-column">

        <div class="avatar-header">
          <h2>Escolha sua foto de perfil</h2>
          <p>Personalize sua conta do seu jeito</p>
        </div>

        <div class="avatar-box">

          <h3>Escolha seu avatar</h3>

          <div class="avatar-grid row g-0">

            <label class="avatar-option">
              <input type="radio" name="avatar" value="1">
              <img src="/imgs/preferencias/monica.jpg" alt="Avatar 1">
            </label>

            <label class="avatar-option">
              <input type="radio" name="avatar" value="2">
              <img src="/imgs/preferencias/bidu.jpg" alt="Avatar 2">
            </label>

            <label class="avatar-option">
              <input type="radio" name="avatar" value="3">
              <img src="/imgs/preferencias/cascao.jpg" alt="Avatar 3">
            </label>

            <label class="avatar-option">
              <input type="radio" name="avatar" value="4">
              <img src="/imgs/preferencias/chico.jpg" alt="Avatar 4">
            </label>

            <label class="avatar-option">
              <input type="radio" name="avatar" value="5">
              <img src="/imgs/preferencias/franjinha.jpg" alt="Avatar 5">
            </label>

            <label class="avatar-option">
              <input type="radio" name="avatar" value="6">
              <img src="/imgs/preferencias/cebolinha.jpg" alt="Avatar 6">
            </label>

            <label class="avatar-option">
              <input type="radio" name="avatar" value="7">
              <img src="/imgs/preferencias/magali.jpg" alt="Avatar 7">
            </label>

            <label class="avatar-option">
              <input type="radio" name="avatar" value="8">
              <img src="/imgs/preferencias/monicao.jpg" alt="Avatar 8">
            </label>

            <label class="avatar-option">
              <input type="radio" name="avatar" value="9">
              <img src="/imgs/preferencias/xaveco.jpg" alt="Avatar 9">
            </label>

          </div>

        </div>

      </section>

    </main>

  </form>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
